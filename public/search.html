<head>

  <link rel="stylesheet" href="style.css" />

<!-- Todo: Add Logic for displaying content in fields -->
<body>
  <div class="header">
    <h1>GIMP EXTENSION REPOSITORY</h1>
    <div class="clearfix"></div>
    <div class="hamburger">
      <a href="javascript:void(0)" onclick="toggle()">
        <!-- Hamburger icon lines -->
        <div></div>
        <div></div>
        <div></div>
      </a>
    </div>
  </div>
  <div class="search">
    <form class="searchHead">
      <input
        type="search"
        class="searchField"
        id="searchtext"
        placeholder="search extension"
      />
      <input
        type="submit"
        class="submitButton"
        value="Search"
        onclick="handleSearch(event)"
      />
    </form>
    <!-- 
    This is the result container that will be generated for each extension returned from db
     
    right now this is a placeholder. This block will actually be generated by the logic in the backend,
    then supplied to the frontend.
     -->
    <div id="resultsContainer"></div>
  </div>
  <div class="sidebar" id="sidebar">
    <nav>
      <h1>Menu</h1>
      <div class="menu">
        <ul>
          <li>
            <a href="/">
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="/search">
              <span>Extension Registry</span>
            </a>
          </li>
          <li class="loggedOut">
            <a href="/login">
              <span>Login</span>
            </a>
          </li>
          <li class="loggedIn">
            <button onclick="fetch('/auth/logout')">Logout</button>
          </li>
        </ul>
      </div>
    </nav>
  </div>
