<head>
  <link rel="stylesheet" href="style.css" />
</head>
<!-- Todo: Add Logic for displaying content in fields -->
<body>
  <div class="search">
    <form class="searchHead">
      <input
        type="search"
        class="searchField"
        id="searchtext"
        placeholder="search extension"
      />
      <input
        type="submit"
        class="submitButton"
        value="Search"
        onclick="handleSearch()"
      />
    </form>
    <!-- 
    This is the result container that will be generated for each extension returned from db
     
    right now this is a placeholder. This block will actually be generated by the logic in the backend,
    then supplied to the frontend.
     -->
    <div id="resultsContainer">
      <div class="result">
        <div
          class="placeholder"
          style="width: 4rem; height: 4rem"
          id="screenshot1"
        ></div>
        <div class="details">
          <h1>Title</h1>
          <p>Author:</p>
          <p>Latest Version:</p>
        </div>
        <div class="buttons">
          <button class="resultButtons , moreInfo">More Info</button>
          <button class="resultButtons , download">Download</button>
        </div>

        <!-- 
        This is the field that will drop-down from the result field when you click "more info"
        for now it will have placeholder material. When the gallery.html page is loaded it'll accept
        paramaters of URLs for each image that the slideshow script will use for its material.
            
        The id for this field will be the name of the extension that fills out it's data. 
        -->
        <div class="infoField" id=""></div>
      </div>
    </div>
  </div>
</body>
<script href=""></script>
