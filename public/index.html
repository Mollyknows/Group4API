<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIMP EXTENSION REPOSITORY</title>
    <link rel="stylesheet" href="style.css" />
    <script src="/ui-scripts/sessionHandler.js"></script>
    <script src="/ui-scripts/sidebar.js"></script>
  </head>
  <body>
    <div class="header">
      <h1>GIMP EXTENSION REPOSITORY</h1>
      <div class="clearfix"></div>
      <div class="hamburger">
        <a href="javascript:void(0)" onclick="toggle()">
          <!-- Hamburger icon lines -->
          <div></div>
          <div></div>
          <div></div>
        </a>
      </div>
    </div>
    <main id="main">
      <div class="content">
        <div class="profile">
          <div class="profile-image"></div>
          <h1>Username</h1>
        </div>
        <div class="nav-tabs">
          <a href="#" class="tab">Manage Downloads</a>
        </div>
        <div class="profile">
          <p>These are your uploaded extensions:</p>
        </div>
        <!-- Your Extension Area-->
        <div id="resultsContainer">
        </div>
      </div>
    </main>
    <div class="sidebar" id="sidebar">
      <nav>
        <h1>Menu</h1>
        <div class="menu">
          <ul>
            <li>
              <a href="/">
                <span>Dashboard</span>
              </a>
            </li>
            <li>
              <a href="/search">
                <span>Extension Registry</span>
              </a>
            </li>
            <li class="loggedOut">
              <a href="/login">
                <span>Login</span>
              </a>
            </li>
            <li class="loggedIn">
              <button onclick="fetch('/auth/logout')">Logout</button>
            </li>
          </ul>
        </div>
      </nav>
    </div>
  </body>

  <script src="ui-scripts/fetcher.js"></script>
  <script>
    window.onload = getUsersUploadedExtensions;
  </script>
</html>
