<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIMP EXTENSION REPOSITORY</title>
    <link rel="stylesheet" href="style.css" />
    <script src="/ui-scripts/sidebar.js"></script>
  </head>
  <body>
    <div class="modal">
      <div class="login">
        <form id="signInForm" action="/auth/login" method="POST">
          <p>Username:</p>
          <input type="text" id="username" class="inputfield" />
          <p>Password:</p>
          <input type="password" id="password" class="inputfield" />
          <div class="buttonHolder">
            <input type="submit" class="submitButton" />
            <!-- <input type="button" class="signupButton" value="Sign Up" /> -->
          </div>
        </form>
        <div id="signInComplete"></div>
      </div>
      <script>
        const signInForm = document.getElementById("signInForm");
        const signInComplete = document.getElementById("signInComplete");

        signInForm.addEventListener("submit", function (event) {
          event.preventDefault();
          const formData = new FormData(signInForm);
          const name = formData.get("name");

          fetch("/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
            },
            body: new URLSearchParams(formData).toString(),
          })
            .then((response) => signInComplete.text())
            .then((data) => {
              signInComplete.textContent = data;
              signInForm.reset();
            })
            .catch((error) => {
              console.error("Error submitting singin info:", error);
              signInComplete.textContent = "An error occurred.";
            });
        });
      </script>
    </div>
  </body>
</html>
