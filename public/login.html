<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIMP EXTENSION REPOSITORY</title>
    <link rel="stylesheet" href="style.css" />
    <script src="/ui-scripts/sidebar.js"></script>
  </head>
  <body>
    <div class="modal">
      <div class="login">
        <form id="signInForm" action="/auth/login" method="POST">
          <div id="signInComplete"></div>
          <div id="errorMessage"></div>
          <p>Email:</p>
          <input type="text" id="email" name="email" class="inputfield" />
          <p>Password:</p>
          <input
            type="password"
            id="password"
            name="password"
            class="inputfield"
          />
          <div class="buttonHolder">
            <input type="submit" class="submitButton" />
            <a href="/register">
              <input type="button" class="signupButton" value="Sign Up" />
            </a>
          </div>
        </form>
      </div>
      <script>
        const signInForm = document.getElementById("signInForm");
        const signInComplete = document.getElementById("signInComplete");
        const errorMessage = document.getElementById("errorMessage");

        signInForm.addEventListener("submit", function (event) {
          event.preventDefault();
          const formData = new FormData(signInForm);
          const email = formData.get("email");
          const password = formData.get("password");

          fetch("/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
            },
            body: new URLSearchParams(formData).toString(),
          })
            .then((response) => response.json())
            .then((data) => {
              if (data.error) {
                errorMessage.textContent = data.error;
                signInComplete.textContent = "";
              } else if (data.message === "Login successful.") {
                signInComplete.textContent = data.message;
                errorMessage.textContent = "";
                console.log(data);
                window.location.href = "/";
              } else {
                signInComplete.textContent =
                  data.message || "Login failed for unknown reason";
                errorMessage.textContent = "";
              }
            })
            .catch((error) => {
              console.error("Error entering login info:", error);
              signInComplete.textContent = "";
              errorMessage.textContent = "An error occurred.";
            });
        });
      </script>
    </div>
  </body>
</html>
